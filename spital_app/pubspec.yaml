name: spital_visu_upu
description: Aplicație mobilă pentru UPU Spitalul Vișeu de Sus
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  url_launcher: ^6.3.0

  # HTTP client
  http: ^1.2.0
  http_parser: ^4.0.2

  # Secure token storage
  flutter_secure_storage: ^9.0.0

  # File picking (PDF upload)
  file_picker: ^8.0.0

  # PDF viewing
  flutter_pdfview: ^1.3.2

  # Temp directory for PDF download
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
